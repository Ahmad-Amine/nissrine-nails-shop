<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#880E4F22;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="#880E4F" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#dots)"/>
  <!-- Decorative circles -->
  <circle cx="480" cy="80"  r="120" fill="#880E4F" opacity="0.06"/>
  <circle cx="100" cy="320" r="90"  fill="#880E4F" opacity="0.06"/>
  <!-- Center card -->
  <rect x="175" y="110" width="250" height="180" rx="20" fill="white" opacity="0.75"/>
  <!-- Emoji -->
  <text x="300" y="195" font-size="56" text-anchor="middle" dominant-baseline="middle">💎</text>
  <!-- Label -->
  <text x="300" y="255" font-family="Georgia, serif" font-size="18" font-weight="600"
        text-anchor="middle" fill="#880E4F">Acrylic</text>
  <!-- Subtitle -->
  <text x="300" y="278" font-family="Arial, sans-serif" font-size="12"
        text-anchor="middle" fill="#880E4F" opacity="0.7">Nissrine Nails Shop</text>
  <!-- Corner decoration -->
  <circle cx="30"  cy="30"  r="8" fill="#880E4F" opacity="0.3"/>
  <circle cx="570" cy="370" r="8" fill="#880E4F" opacity="0.3"/>
  <circle cx="570" cy="30"  r="5" fill="#880E4F" opacity="0.2"/>
  <circle cx="30"  cy="370" r="5" fill="#880E4F" opacity="0.2"/>
</svg>